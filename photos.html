<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photos</title>

<style>
body{
    margin:0;
    font-family:Consolas, monospace;
    background:#050505;
    color:#00ff88;
}

.nav{
    display:flex;
    justify-content:space-around;
    padding:15px;
    border-bottom:1px solid #00ff88;
}

.nav a{
    color:#00ff88;
    text-decoration:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
    padding:20px;
    max-width:800px;
    margin:auto;
}

.grid img{
    width:100%;
    height:150px;
    object-fit:cover;
    border:2px solid #00ff88;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,255,100,.3);
}
</style>

</head>

<body>

<div class="nav">
    <a href="index.html">INFO</a>
    <a href="photos.html">PHOTOS</a>
</div>

<div class="grid">
    <img src="images/img1.jpg">
    <img src="images/img2.jpg">
    <img src="images/img3.jpg">
</div>

</body>
</html>
